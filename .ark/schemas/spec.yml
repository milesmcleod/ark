name: spec
directory: spec
prefix: SPEC
fields:
  - name: id
    type: string
    required: true
    derived: true
    pattern: "^SPEC-\\d{3}$"
  - name: title
    type: string
    required: true
  - name: status
    type: enum
    required: true
    values: [draft, active, deprecated]
    default: draft
  - name: tags
    type: list
  - name: created
    type: date
    derived: true
  - name: updated
    type: date
    derived: true
template: |
  Feature:
    As a [role]
    I want [capability]
    So that [benefit]

    Scenario:
      Given [precondition]
      When [action]
      Then [expected outcome]
